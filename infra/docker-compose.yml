version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: hk_charity_postgres
    environment:
      POSTGRES_DB: charity_insights
      POSTGRES_USER: charity
      POSTGRES_PASSWORD: charity_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: hk_charity_redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2024-01-11T07-46-16Z
    container_name: hk_charity_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: charity
      MINIO_ROOT_PASSWORD: charity_dev_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:

